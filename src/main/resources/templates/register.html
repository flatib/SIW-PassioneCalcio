<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registrazione</title>
    <link rel="stylesheet" th:href="@{/css/stile.css}">
</head>
<body>
<div class="auth-card">
    <h1>Registrazione</h1>

    <form th:action="@{/register}" method="post" th:object="${credentials}">
        <div class="form-group">
            <label for="username">Username</label>
            <input id="username" type="text" th:field="*{username}" required>
            <div class="error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}">Errore username</div>
            <div class="error" th:if="${usernameExists}">
                Username già in uso.
            </div>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input id="password" type="password" th:field="*{password}" required>
            <div class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">Errore password</div>
        </div>

        <button class="btn" type="submit">Registrati</button>
    </form>

    <p style="margin-top: 16px;">
        Hai già un account?
        <a th:href="@{/login}">Accedi</a>
    </p>
</div>
</body>
</html>
